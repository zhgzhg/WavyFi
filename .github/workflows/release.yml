name: Release

# Pushing a tag like v1.2.3 builds the release assets and creates a DRAFT
# GitHub release carrying them — review the generated notes, then publish.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test

      - name: Publish
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')

          # Self-contained single-file exe per architecture: download and run,
          # no runtime install needed.
          foreach ($rid in 'win-x64', 'win-arm64') {
            dotnet publish src/WavyFi -c Release -r $rid --self-contained `
              -p:PublishSingleFile=true `
              -p:IncludeNativeLibrariesForSelfExtract=true `
              -p:EnableCompressionInSingleFile=true `
              -p:DebugType=none -p:Version=$version -o "out/$rid"
            if ($LASTEXITCODE -ne 0) { exit 1 }
            Compress-Archive -Path "out/$rid/WavyFi.exe", 'LICENSE', 'README.md' `
              -DestinationPath "WavyFi-$version-$rid.zip"
          }

          # Small variant for users who already have the .NET Desktop Runtime.
          # (No EnableCompressionInSingleFile here: the SDK only supports it
          # for self-contained publishes — NETSDK1176.)
          dotnet publish src/WavyFi -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=true -p:DebugType=none -p:Version=$version `
            -o out/fdd
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Compress-Archive -Path 'out/fdd/WavyFi.exe', 'LICENSE', 'README.md' `
            -DestinationPath "WavyFi-$version-win-x64-framework-dependent.zip"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME (Get-ChildItem 'WavyFi-*.zip').FullName `
            --draft --generate-notes --title "WavyFi $env:GITHUB_REF_NAME"
